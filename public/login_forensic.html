<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FBI | FORENSIC LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <style>
        /* --- ADMIN THEME (Red Accents) --- */
        body { background-color: #0b1118; color: #e6edf3; font-family: 'Inter', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .grid-bg { position: absolute; width: 100%; height: 100%; background-image: linear-gradient(rgba(33, 38, 45, 0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(33, 38, 45, 0.3) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; }
        
        .login-container { width: 400px; padding: 40px; background: #161b22; border: 1px solid #d73a49; /* RED BORDER FOR ADMIN */ border-radius: 12px; text-align: center; box-shadow: 0 0 50px rgba(215, 58, 73, 0.2); }
        
        h1 { font-family: 'Roboto Mono'; font-size: 24px; margin-bottom: 5px; color: #d73a49; } /* RED TEXT */
        input { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: white; margin-bottom: 20px; outline: none; }
        input:focus { border-color: #d73a49; }
        
        button { width: 100%; padding: 12px; background: #d73a49; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-family: 'Roboto Mono'; }
        button:hover { background: #b62324; }
        label { display: block; text-align: left; color: #8b949e; font-size: 11px; margin-bottom: 5px; font-family: 'Roboto Mono'; }
        .error-msg { color: #ff7b72; font-size: 12px; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <div class="login-container">
        <img src="logo.png" width="60" style="margin-bottom:15px;">
        <h1>FORENSIC LAB ACCESS</h1>
        <p style="color:#e3b341; margin-bottom:30px; font-size:12px;">HIGHEST CLEARANCE REQUIRED</p>

        <form id="loginForm">
            <label>FORENSIC USERNAME</label>
            <input type="text" id="username" required>

            <label>PASSWORD</label>
            <input type="password" id="password" required>

            <button type="submit">ACCESS HQ</button>
        </form>

        <div id="error-message" class="error-msg">❌ Access Denied</div>
        
        <p style="margin-top: 15px; font-size: 12px; color: #8b949e;">
    No Account? <a href="register_forensic.html" style="color: #d73a49;">Register New Forensic</a>
</p>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.querySelector('button');
            const errDiv = document.getElementById('error-message');
            
            btn.innerText = "VERIFYING...";
            errDiv.style.display = 'none';

            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                selectedRole: 'Forensic' // <--- 🛑 WE HARDCODE "Admin" HERE!
            };

            try {
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();

                if(data.success) {
                    localStorage.setItem('userRole', 'Forensic');
                    localStorage.setItem('username', data.username);
                    window.location.href = 'dashboard_forensic.html'; // <--- GO TO ADMIN DASHBOARD
                } else {
                    errDiv.innerText = "❌ " + data.message;
                    errDiv.style.display = 'block';
                    btn.innerText = "ACCESS HQ";
                }
            } catch(e) { console.error(e); }
        });
    </script>
</body>
</html>
