<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FBI | Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <style>
        /* --- SECURE LOGIN THEME --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #0b1118; 
            color: #e6edf3; 
            font-family: 'Inter', sans-serif; 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            overflow: hidden;
        }

        .grid-bg {
            position: absolute; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(33, 38, 45, 0.3) 1px, transparent 1px),
            linear-gradient(90deg, rgba(33, 38, 45, 0.3) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
        }

        .login-container {
            width: 400px;
            padding: 40px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
            text-align: center;
        }

        .logo { margin-bottom: 20px; }
        .logo img { width: 80px; }
        h1 { font-family: 'Roboto Mono', monospace; font-size: 24px; margin-bottom: 10px; color: #fff; }
        p { color: #8b949e; font-size: 13px; margin-bottom: 30px; }

        /* Form Elements */
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; color: #8b949e; font-size: 12px; font-family: 'Roboto Mono'; margin-bottom: 8px; }
        
        /* INPUTS & SELECT */
        input, select {
            width: 100%;
            padding: 12px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 6px;
            color: white;
            font-size: 14px;
            font-family: 'Inter';
            outline: none;
            transition: border 0.2s;
        }
        input:focus, select:focus { border-color: #58a6ff; }
        
        /* Custom Arrow for Select */
        select { cursor: pointer; appearance: none; -webkit-appearance: none; background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%238b949e%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); background-repeat: no-repeat; background-position: right .7em top 50%; background-size: .65em auto; }

        button {
            width: 100%; padding: 12px; background: #1f6feb; color: white; border: none; border-radius: 6px;
            font-size: 14px; font-weight: bold; cursor: pointer; transition: background 0.2s; font-family: 'Roboto Mono';
        }
        button:hover { background: #388bfd; }

        .error-msg { color: #ff7b72; font-size: 12px; margin-top: 15px; display: none; font-family: 'Roboto Mono'; }
        .secure-badge { margin-top: 30px; font-size: 10px; color: #484f58; font-family: 'Roboto Mono'; }
    </style>
</head>
<body>

    <div class="grid-bg"></div>

    <div class="login-container">
        <div class="logo"><img src="logo.png" alt="FBI Logo"></div>
        <h1>FBI SYSTEM</h1>
        <p>FEDERAL BUREAU OF INVESTIGATION</p>

        <form id="loginForm">
            <div class="form-group">
                <label>DEPARTMENT / ROLE</label>
                <select id="role_select" required>
                    <option value="" disabled selected>-- Select Your Clearance --</option>
                    <option value="Admin">Administrator (HQ)</option>
                    <option value="Agent">Field Agent</option>
                    <option value="Analyst">Data Analyst</option>
                    <option value="Forensic">Forensic Lab Staff</option>
                </select>
            </div>

            <div class="form-group">
                <label>AGENT ID / USERNAME</label>
                <input type="text" id="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>ACCESS CODE</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit">AUTHENTICATE</button>
            <p style="margin-top: 15px; font-size: 12px; color: #8b949e;">
    New Recruit? <a href="register.html" style="color: #58a6ff; text-decoration: none;">Create Profile</a>
</p>
        </form>

        <div id="error-message" class="error-msg">❌ Access Denied</div>

        <div class="secure-badge">
            🔒 SECURE CONNECTION ESTABLISHED<br>
            UNAUTHORIZED ACCESS IS A FEDERAL OFFENSE
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // GET ALL 3 VALUES
            const roleIn = document.getElementById('role_select').value;
            const usernameIn = document.getElementById('username').value;
            const passwordIn = document.getElementById('password').value;
            
            const errorDiv = document.getElementById('error-message');
            const btn = document.querySelector('button');

            btn.innerText = "VERIFYING CLEARANCE...";
            btn.style.opacity = "0.7";
            errorDiv.style.display = 'none';

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: usernameIn, 
                        password: passwordIn,
                        selectedRole: roleIn // SENDING THE SELECTED ROLE TO SERVER!
                    })
                });

                const data = await response.json();

                if (data.success) {
                    localStorage.setItem('userRole', data.role);
                    localStorage.setItem('username', data.username);

                    if (data.role === 'Forensic') {
                        window.location.href = 'forensic_dashboard.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                } else {
                    errorDiv.innerText = "❌ " + data.message;
                    errorDiv.style.display = 'block';
                    btn.innerText = "AUTHENTICATE";
                    btn.style.opacity = "1";
                }
            } catch (err) {
                console.error(err);
                errorDiv.innerText = "❌ Server Error.";
                errorDiv.style.display = 'block';
                btn.innerText = "AUTHENTICATE";
            }
        });
    </script>
</body>
</html>
