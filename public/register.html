<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FBI | New Agent Registration</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <style>
        /* --- COPYING LOGIN THEME --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: #0b1118; color: #e6edf3; font-family: 'Inter', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; }
        .grid-bg { position: absolute; width: 100%; height: 100%; background-image: linear-gradient(rgba(33, 38, 45, 0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(33, 38, 45, 0.3) 1px, transparent 1px); background-size: 40px 40px; z-index: -1; }
        .register-container { width: 450px; padding: 40px; background: #161b22; border: 1px solid #30363d; border-radius: 12px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.8); }
        h1 { font-family: 'Roboto Mono'; font-size: 22px; margin-bottom: 10px; }
        input, select { width: 100%; padding: 12px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; color: white; margin-bottom: 15px; font-family: 'Inter'; outline: none; }
        input:focus, select:focus { border-color: #58a6ff; }
        button { width: 100%; padding: 12px; background: #238636; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-family: 'Roboto Mono'; }
        button:hover { background: #2ea043; }
        label { display: block; text-align: left; color: #8b949e; font-size: 11px; margin-bottom: 5px; font-family: 'Roboto Mono'; }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <div class="register-container">
        <div style="margin-bottom: 20px;"><img src="logo.png" width="60"></div>
        <h1>PERSONNEL ONBOARDING</h1>
        <p style="color:#8b949e; font-size:12px; margin-bottom:20px;">CREATE SECURE ACCESS PROFILE</p>

        <form id="regForm">
            <label>FULL NAME</label>
            <input type="text" id="full_name" required placeholder="e.g. Agent Smith">

            <label>DEPARTMENT / ROLE</label>
            <select id="role" required>
                <option value="Agent">Field Agent</option>
                <option value="Analyst">Data Analyst</option>
                <option value="Forensic">Forensic Lab Staff</option>
                <option value="Admin">Administrator</option>
            </select>

            <label>DESIRED USERNAME</label>
            <input type="text" id="username" required placeholder="e.g. smith_neo">

            <label>PASSWORD</label>
            <input type="password" id="password" required placeholder="******">

            <button type="submit">SUBMIT PROFILE</button>
        </form>

        <p style="margin-top:15px; font-size:12px;">
            <a href="login.html" style="color:#58a6ff; text-decoration:none;">&larr; Back to Login</a>
        </p>
    </div>

    <script>
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const payload = {
                full_name: document.getElementById('full_name').value,
                role: document.getElementById('role').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            const res = await fetch('/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            
            if(data.success) {
                alert("✅ Registration Successful! Please Log In.");
                window.location.href = 'login.html';
            } else {
                alert("❌ Error: " + data.message);
            }
        });
    </script>
</body>
</html>
