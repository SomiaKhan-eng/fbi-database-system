<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FBI | Forensic Lab Unit</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Inter:wght@400;800&display=swap" rel="stylesheet">
    <style>
        /* --- 1. CORE THEME (MATCHING ADMIN/AGENT) --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #e6edf3;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- 2. SIDEBAR --- */
        .sidebar {
            width: 260px;
            flex-shrink: 0;
            background-color: #161b22;
            border-right: 1px solid #30363d;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }

        .brand {
            font-family: 'Roboto Mono', monospace;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
            border-bottom: 1px solid #30363d;
            padding-bottom: 20px;
        }

        .nav-links {
            list-style: none;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .nav-links li a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 15px;
            text-decoration: none;
            color: #8b949e;
            font-family: 'Roboto Mono', monospace;
            font-size: 13px;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .nav-links li:hover a {
            background-color: #21262d;
            color: #58a6ff; /* BLUE HOVER */
        }

        /* Active State: BLUE (Matches Admin/Agent) */
        .nav-links li.active a {
            background-color: #1f6feb; 
            color: white;
            font-weight: bold;
        }

        .user-panel {
            border-top: 1px solid #30363d;
            padding-top: 20px;
            margin-top: auto;
        }

        .logout-btn {
            background: #21262d;
            border: 1px solid #30363d;
            color: #d73a49;
            padding: 10px;
            width: 100%;
            cursor: pointer;
            font-family: 'Roboto Mono', monospace;
            font-size: 12px;
            border-radius: 6px;
            transition: 0.2s;
            margin-top: 10px;
        }
        .logout-btn:hover {
            background: #d73a49;
            color: white;
            border-color: #d73a49;
        }

        /* --- 3. MAIN CONTENT --- */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        h1 {
            font-family: 'Roboto Mono', monospace;
            font-size: 24px;
            color: #58a6ff; /* Changed from Purple to Blue */
        }

        .date-display {
            font-family: 'Roboto Mono', monospace;
            color: #8b949e;
            font-size: 14px;
        }

        /* --- 4. PANELS & GRID --- */
        .dashboard-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .panel {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 20px;
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #21262d;
            padding-bottom: 15px;
            margin-bottom: 5px;
        }

        .panel-title {
            font-family: 'Roboto Mono';
            font-size: 14px;
            font-weight: bold;
            color: #fff;
        }

        /* --- 5. FORENSIC WIDGETS --- */
        
        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: #161b22; border: 1px solid #30363d; padding: 20px; border-radius: 8px; position: relative;
        }
        .stat-card h3 { font-size: 12px; color: #8b949e; font-family: 'Roboto Mono'; margin-bottom: 10px; text-transform: uppercase; }
        .stat-card .value { font-size: 28px; font-weight: 800; color: #fff; }
        .stat-card::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #58a6ff; } /* Blue Accent */

        /* Tables */
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { text-align: left; color: #8b949e; padding: 10px 0; border-bottom: 1px solid #30363d; font-family: 'Roboto Mono'; font-size: 11px; }
        td { padding: 12px 0; border-bottom: 1px solid #21262d; color: #e6edf3; }
        
        /* Badges */
        .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; border: 1px solid; }
        .badge-pending { background: rgba(227, 179, 65, 0.1); color: #e3b341; border-color: #e3b341; }
        
        /* Forms */
        label { display: block; font-size: 11px; color: #8b949e; margin-bottom: 5px; font-family: 'Roboto Mono'; }
        input, textarea, select {
            width: 100%; background: #0d1117; border: 1px solid #30363d; color: #e6edf3;
            padding: 12px; border-radius: 6px; font-family: 'Inter'; font-size: 13px; outline: none;
        }
        input:focus, textarea:focus, select:focus { border-color: #58a6ff; }

        /* Blue Button (Matches Agent/Admin) */
        .btn-primary {
            background-color: #1f6feb;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-family: 'Roboto Mono';
            font-size: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-primary:hover { background-color: #388bfd; }

    </style>
</head>
<body>

    <nav class="sidebar">
        <div class="brand">
            <span>🕵️‍♂️ FBI SYSTEM</span>
        </div>
        
        <ul class="nav-links">
            <li class="active"><a href="dashboard_forensic.html">📊 DASHBOARD</a></li>
            <li><a href="evidence.html">🧬 EVIDENCE VAULT</a></li>
        </ul>

        <div class="user-panel">
            <p style="font-size:10px; color:#8b949e; margin-bottom:5px;">CURRENT SESSION</p>
            <h3 id="user-display" style="font-size: 14px; margin-bottom: 5px;">LOADING...</h3>
            
            <button class="logout-btn" onclick="handleLogout()">SECURE LOGOUT</button>
        </div>
    </nav>

    <main class="main-content">
        <header>
            <h1>FORENSIC LAB UNIT</h1>
            <div class="date-display" id="date-display">--/--/----</div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Items in Lab</h3>
                <div class="value">24</div>
            </div>
            <div class="stat-card">
                <h3>Pending Analysis</h3>
                <div class="value" id="pending-count">8</div>
            </div>
            <div class="stat-card">
                <h3>Reports Filed</h3>
                <div class="value">156</div>
            </div>
            <div class="stat-card">
                <h3>Lab Status</h3>
                <div class="value" style="color:#3fb950">ACTIVE</div>
            </div>
        </div>

        <div class="dashboard-grid">
            
            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">PENDING ANALYSIS QUEUE</span>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>EVIDENCE ID</th>
                            <th>TYPE</th>
                            <th>DESCRIPTION</th>
                            <th>STATUS</th>
                        </tr>
                    </thead>
                    <tbody id="pending-list">
                        <tr><td colspan="4" style="text-align:center; color:#8b949e;">Scanning evidence locker...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="panel">
                <div class="panel-header">
                    <span class="panel-title">FILE LAB REPORT</span>
                </div>
                <form id="forensicForm" style="display: flex; flex-direction: column; gap: 15px;">
                    <div>
                        <label>EVIDENCE ID</label>
                        <input type="number" id="ev_id" placeholder="Enter ID (e.g. 401)">
                    </div>
                    <div>
                        <label>FORENSIC RESULT / ANALYSIS</label>
                        <textarea id="result" rows="5" placeholder="Enter chemical/digital analysis results..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn-primary">SUBMIT REPORT</button>
                </form>
            </div>

        </div>
    </main>

    <script>
        // 1. SET DATE
        const now = new Date();
        document.getElementById('date-display').innerText = now.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

        // 2. CHECK LOGIN SESSION
        // We look for 'full_name' first (if available), otherwise 'username'
        const user = localStorage.getItem('full_name') || localStorage.getItem('username') || 'Unknown Forensic';
        const role = localStorage.getItem('userRole');

        // Security Check
        // If Role is NOT Forensic and NOT Admin, kick them out
        if (role !== 'Forensic' && role !== 'Admin') {
            window.location.href = 'index.html';
        }

        document.getElementById('user-display').innerText = `${role ? role.toUpperCase() : 'FORENSIC'}: ${user.toUpperCase()}`;

        // 3. LOGOUT FUNCTION
        function handleLogout() {
            localStorage.removeItem('userRole');
            localStorage.removeItem('username');
            localStorage.removeItem('full_name');
            window.location.href = 'index.html';
        }

        // 4. LOAD PENDING EVIDENCE
        async function loadForensicData() {
            try {
                // Fetch ALL evidence from our Smart API
                const response = await fetch('/api/evidence'); 
                const result = await response.json();
                
                // Handle the data structure (depending on how API returns it)
                const allEvidence = result.data ? result.data : result;

                // Mock Filter: Show only evidence that hasn't been reported yet
                // (In a real app, you would filter by status='Pending')
                const pendingItems = Array.isArray(allEvidence) ? allEvidence.slice(0, 4) : []; 

                const tableBody = document.getElementById('pending-list');
                tableBody.innerHTML = '';

                if (pendingItems.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="4" style="text-align:center;">All clear.</td></tr>';
                    return;
                }

                pendingItems.forEach(ev => {
                    tableBody.innerHTML += `
                        <tr>
                            <td style="font-family:'Roboto Mono'">#${ev.evidence_id}</td>
                            <td>${ev.evidence_type}</td>
                            <td style="color:#8b949e;">${ev.description ? ev.description.substring(0, 20) : 'No Desc'}...</td>
                            <td><span class="badge badge-pending">PENDING</span></td>
                        </tr>`;
                });

            } catch (error) {
                console.error("Error:", error);
                document.getElementById('pending-list').innerHTML = '<tr><td colspan="4" style="color:#ff7b72; text-align:center;">Connection Error</td></tr>';
            }
        }

        // 5. SUBMIT REPORT
        document.getElementById('forensicForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('ev_id').value;
            const res = document.getElementById('result').value;

            if(!id || !res) {
                alert("Please fill all fields.");
                return;
            }

            // Simulate API Call
            // await fetch('/api/reports', { method: 'POST', body: ... })

            alert(`✅ Forensic Report filed for Evidence #${id}`);
            document.getElementById('forensicForm').reset();
        });

        loadForensicData();
    </script>
</body>
</html>
